{% extends "inspections/admin_base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 8rem auto; text-align: center; background: #ffffff; backdrop-filter: blur(25px); border: 1px solid rgba(0,0,0,0.08); border-radius: 40px; padding: 4rem; box-shadow: 0 40px 100px rgba(0,0,0,0.08);">
    <div style="margin-bottom: 2rem; display: flex; justify-content: center; align-items: center; color: #ef4444;">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    </div>
    <h1 style="font-size: 2.2rem; font-weight: 800; color: var(--text-primary); margin-bottom: 1.5rem;">Confirmer la suppression</h1>
    <p style="color: var(--text-secondary); font-size: 1.1rem; line-height: 1.6; margin-bottom: 3rem;">
        Êtes-vous sûr de vouloir supprimer définitivement le véhicule <strong style="color: var(--text-primary);">{{ car.brand }} {{ car.model_name }}</strong> ({{ car.license_plate }}) ? Cette action est irréversible.
    </p>

    <form method="post">
        {% csrf_token %}
        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <button type="submit" class="btn" style="background: var(--danger); padding: 1.2rem; border-radius: 15px; font-weight: 800; font-size: 1.1rem; border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);">
                Oui, supprimer définitivement
            </button>
            <a href="{% url 'inspections:car_management' %}" style="padding: 1.2rem; font-weight: 700; color: var(--text-primary); text-decoration: none; font-size: 1rem; border: 1px solid rgba(0,0,0,0.08); border-radius: 15px; background: #ffffff; transition: 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.06)'">
                Annuler l'action
            </a>
        </div>
    </form>
</div>
{% endblock %}
