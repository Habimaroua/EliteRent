worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    upstream web_platform {
        server web_diagnostic:8001;
    }

    upstream ai_service {
        server ai_diagnostic:8000;
    }

    server {
        listen 80;

        # Route to AI Service
        location /analyze {
            proxy_pass http://ai_service/analyze;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            proxy_pass http://ai_service/health;
        }

        # Route to Web Platform
        location / {
            proxy_pass http://web_platform;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
